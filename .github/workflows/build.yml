name: build

on:
  push:
    branches: [ "**" ]
    tags: [ 'office-presence-*.*.*' ]

env:
  BASE_IMAGE_NAME: ghcr.io/neuland-ingolstadt/office-presence
  VERSION_TAG_PREFIX: 'office-presence-'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: mvn package native
        run: mvn -B package -Dnative -Dquarkus.native.container-build=true -DskipTests

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.BASE_IMAGE_NAME }}
          tags: |
            # increasing run number tag on main
            type=raw,value=${{ github.run_number }},enable={{is_default_branch}}
            # for version tags (only works for tags)
            type=match,pattern=${{ env.VERSION_TAG_PREFIX }}\d.\d.\d
            # for containers on feature branches
            type=ref,event=branch,enable=${{ github.ref_name != github.event.repository.default_branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/main/docker/Dockerfile.native-micro
          # don't push dependabot branches
          push: ${{ !startsWith(github.ref, 'refs/heads/dependabot') }}
          tags: ${{ steps.meta.outputs.tags }}
